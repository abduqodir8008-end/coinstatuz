<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinStat UZ | Home</title>
    <!-- Premium Shriftlar -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --bg-dark: #000000; /* Toza qora */
            --card-bg: #0a0e14; /* To'q kiber karta */
            --border-color: #1f2937; /* Yupqa zamonaviy chegara */
            --text-main: #ffffff;
            --text-dim: #6b7280;
            --up-color: #00ff88; /* Aktiv yashil */
            --down-color: #ff2a5f; /* Aktiv qizil */
            --accent-blue: #007bff;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ASOSIY KONTEYNER VA ULTRA SILLIQ KIRISH */
        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            box-sizing: border-box;
            
            /* SILLIQ CINEMATIC ENTANCE (FAQAT BIR MARTA SEKIN KIRADI) */
            opacity: 0;
            transform: translateY(20px);
            animation: appSlowEntrance 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes appSlowEntrance {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 20px;
        }

        .logo-wrapper { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        .logo-wrapper img { 
            width: 42px; 
            height: 42px; 
        }
        .logo-text { 
            font-size: 22px; 
            font-weight: 800; 
            letter-spacing: -0.5px; 
            text-transform: uppercase;
        }
        .logo-text span { 
            font-weight: 200; 
            opacity: 0.5; 
        }

        .live-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: 700;
            color: var(--up-color);
            background: rgba(0, 255, 136, 0.05);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid rgba(0, 255, 136, 0.15);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .blink-dot {
            width: 6px;
            height: 6px;
            background: var(--up-color);
            border-radius: 50%;
            animation: dotBlink 1.5s infinite;
        }

        @keyframes dotBlink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* BO'LIMLAR SARLAVHASI */
        .page-header {
            margin-bottom: 25px;
        }
        .page-header h1 { 
            font-size: 28px; 
            margin: 0; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }
        .page-header p { 
            color: var(--text-dim); 
            margin-top: 6px; 
            font-size: 14px; 
            line-height: 1.4;
        }

        /* ASOSIY MENYU KARTALARI */
        .menu-grid {
            margin-bottom: 30px;
        }

        .menu-card {
            display: flex;
            align-items: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            margin-bottom: 14px;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--border-color);
            transition: background 0.2s, border-color 0.2s, transform 0.1s;
        }

        .menu-card:hover {
            border-color: #374151;
            background: #111827;
        }

        .menu-card:active { 
            transform: scale(0.98); 
        }

        .m-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 16px;
            flex-shrink: 0;
        }

        /* Ikonka ranglari */
        .icon-kurs { background: rgba(0, 255, 136, 0.08); color: var(--up-color); }

        .m-info { flex: 1; }
        .m-info b { display: block; font-size: 16px; margin-bottom: 4px; font-weight: 700; }
        
        .price-text-val { 
            font-family: 'JetBrains Mono', monospace; 
            color: var(--text-main); 
            font-weight: 700; 
            font-size: 16px;
            transition: color 0.1s ease;
        }

        /* KURS NARXI UCHUN QO'SHIMCHA STIL */
        .price-tag {
            text-align: right;
        }
        
        .change-badge-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; 
            font-weight: 700;
        }

        /* ADMIN TUGMASI */
        .admin-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111827;
            color: white;
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            gap: 10px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .admin-btn:hover {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            box-shadow: 0 8px 24px rgba(0, 123, 255, 0.25);
        }

        /* FAQAT MATN UPDATE BULGANDA MILTILLAYDI (TRADINGVIEW EFFEKTI) */
        .flash-up { animation: flashU 0.8s ease-out; }
        .flash-down { animation: flashD 0.8s ease-out; }
        
        @keyframes flashU { 0% { color: var(--up-color); } 100% { color: var(--text-main); } }
        @keyframes flashD { 0% { color: var(--down-color); } 100% { color: var(--text-main); } }
    </style>
</head>

<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo-wrapper">
                <img src="./brand (1).svg" alt="Logo">
                <div class="logo-text">cofeature <span></span></div>
            </div>
            <div class="live-status">
                <div class="blink-dot"></div> Jonli
            </div>
        </div>

        <!-- Page Title -->
        <div class="page-header">
            <h1>Asosiy menyu</h1>
            <p>Loyiha xizmatlaridan foydalanish uchun bo'limni tanlang</p>
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid">
            <a href="./index.html" class="menu-card">
                <div class="m-icon icon-kurs"><i class="bi bi-graph-up-arrow"></i></div>
                <div class="m-info">
                    <b>Bozor Kursi</b>
                    <span id="ton-price" class="price-text-val">$0.0000</span>
                </div>
                <div class="price-tag">
                    <div id="ton-change" class="change-badge-val" style="color: var(--up-color);">0.00%</div>
                </div>
            </a>
        </div>

        <!-- Admin Button -->
        <a href="https://t.me/cofeature" class="admin-btn">
            <i class="bi bi-telegram"></i> Admin bilan bog'lanish
        </a>
    </div>

    <script>
        let lastPrices = {};

        async function fetchPrices() {
            try {
                const symbols = ["TONUSDT"];
                const response = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${JSON.stringify(symbols)}`);
                const data = await response.json();

                data.forEach(item => {
                    let id = "ton";
                    const priceEl = document.getElementById(`${id}-price`);
                    const changeEl = document.getElementById(`${id}-change`);
                    if(!priceEl || !changeEl) return;
                    
                    const newPrice = parseFloat(item.lastPrice);
                    const oldPrice = lastPrices[id];

                    // Toza va chiroyli TradingView miltillash effekti
                    if (oldPrice && newPrice !== oldPrice) {
                        const cls = newPrice > oldPrice ? 'flash-up' : 'flash-down';
                        priceEl.classList.remove('flash-up', 'flash-down');
                        void priceEl.offsetWidth; // Animatsiyani qayta tiklash
                        priceEl.classList.add(cls);
                    }

                    priceEl.innerText = `$${newPrice.toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 4 })}`;

                    const ch = parseFloat(item.priceChangePercent);
                    changeEl.innerText = `${ch >= 0 ? '▲' : '▼'} ${Math.abs(ch).toFixed(2)}%`;
                    changeEl.style.color = ch >= 0 ? 'var(--up-color)' : 'var(--down-color)';

                    lastPrices[id] = newPrice;
                });
            } catch (e) { 
                console.error("Kursni yuklashda xato"); 
            }
        }

        setInterval(fetchPrices, 2500);
        fetchPrices();
    </script>

</body>
</html>
