<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinStat UZ | Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --bg-dark: #000;
            --card-bg: #0f0f0f;
            --border-color: #1e1e1e;
            --text-main: #ffffff;
            --text-dim: #666;
            --up-color: #00ff88;
            --down-color: #ff3366;
            --accent-blue: #007bff;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .logo-wrapper { display: flex; align-items: center; gap: 12px; }
        .logo-wrapper img { width: 45px; height: 45px; }
        .logo-text { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .logo-text span { font-weight: 200; opacity: 0.6; }

        /* BO'LIMLAR SARLAVHASI */
        .page-header {
            margin-bottom: 25px;
        }
        .page-header h1 { font-size: 28px; margin: 0; font-weight: 800; }
        .page-header p { color: var(--text-dim); margin-top: 5px; font-size: 14px; }

        /* ASOSIY MENYU KARTALARI */
        .menu-grid {
            margin-bottom: 30px;
        }

        .menu-card {
            display: flex;
            align-items: center;
            padding: 22px;
            background: var(--card-bg);
            border-radius: 28px;
            margin-bottom: 14px;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-card:hover {
            border-color: #333;
            background: #151515;
            transform: translateY(-2px);
        }

        .menu-card:active { transform: scale(0.97); }

        .m-icon {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 18px;
            flex-shrink: 0;
        }

        /* Ikonka ranglari */
        .icon-olish { background: rgba(0, 123, 255, 0.1); color: #007bff; }
        .icon-gift { background: rgba(163, 0, 255, 0.1); color: #a300ff; }
        .icon-kurs { background: rgba(0, 255, 136, 0.1); color: #00ff88; }
        .icon-hamkor { background: rgba(0, 217, 255, 0.1); color: #00d9ff; }

        .m-info { flex: 1; }
        .m-info b { display: block; font-size: 18px; margin-bottom: 2px; }
        .m-info span { color: var(--text-dim); font-size: 13px; line-height: 1.4; }

        /* KURS NARXI UCHUN QO'SHIMCHA STIL */
        .price-tag {
            text-align: right;
            font-family: 'SF Mono', monospace;
        }

        /* ADMIN TUGMASI */
        .admin-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-blue);
            color: white;
            padding: 18px;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 800;
            gap: 10px;
            margin-top: 10px;
            box-shadow: 0 4px 20px rgba(0, 123, 255, 0.2);
        }

        /* NARX O'ZGARISHI ANIMATSIYASI */
        .flash-up { animation: flashU 0.6s; }
        .flash-down { animation: flashD 0.6s; }
        @keyframes flashU { 0% { color: var(--up-color); } 100% { color: white; } }
        @keyframes flashD { 0% { color: var(--down-color); } 100% { color: white; } }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <div class="logo-wrapper">
                <img src="./V4gQu01.svg" alt="Logo">
                <div class="logo-text">CoinStat <span>UZ</span></div>
            </div>
            <span style="font-size: 12px; color: var(--text-dim);">Jonli yangilanmoqda</span>
        </div>

        <div class="page-header">
            <h1>Asosiy menyu</h1>
            <p>Loyiha xizmatlaridan foydalanish uchun bo'limni tanlang</p>
        </div>

        <div class="menu-grid">


             <a href="./index.html" class="menu-card">
                <div class="m-icon icon-kurs"><i class="bi bi-graph-up-arrow"></i></div>
                <div class="m-info">
                    <b>Bozor Kursi</b>
                    <span id="ton-price" style="color: white; font-weight: 700; font-size: 16px;">$0.0000</span>
                </div>
                <div class="price-tag">
                    <div id="ton-change" style="font-size: 12px; font-weight: 800;">0.00%</div>
                </div>
            </a>
            
            <a href="./buy-ton.html" class="menu-card">
                <div class="m-icon icon-olish"><i class="bi bi-cart-fill"></i></div>
                <div class="m-info">
                    <b>TON Olish</b>
                    <span>Ishonchli P2P va adminlar orqali xarid</span>
                </div>
            </a>

            <a href="./nft_gift.html" class="menu-card">
                <div class="m-icon icon-gift"><i class="bi bi-gift-fill"></i></div>
                <div class="m-info">
                    <b>NFT Gift</b>
                    <span>Telegram NFT sovg'alarini sotib olish</span>
                </div>
            </a>

           

            <a href="./hamkor.html" class="menu-card">
                <div class="m-icon icon-hamkor"><i class="bi bi-people-fill"></i></div>
                <div class="m-info">
                    <b>Hamkorlik</b>
                    <span>Loyiha bilan birga daromad qiling</span>
                </div>
            </a>

            

        </div>

        <a href="https://t.me/admin_user" class="admin-btn">
            <i class="bi bi-telegram"></i> Admin bilan bog'lanish
        </a>
    </div>

    <script>
        let lastPrices = {};

        async function fetchPrices() {
            try {
                const symbols = ["TONUSDT"];
                const response = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${JSON.stringify(symbols)}`);
                const data = await response.json();

                data.forEach(item => {
                    let id = "ton";
                    const priceEl = document.getElementById(`${id}-price`);
                    const changeEl = document.getElementById(`${id}-change`);
                    
                    const newPrice = parseFloat(item.lastPrice);
                    const oldPrice = lastPrices[id];

                    if (oldPrice && newPrice !== oldPrice) {
                        const cls = newPrice > oldPrice ? 'flash-up' : 'flash-down';
                        priceEl.classList.add(cls);
                        setTimeout(() => priceEl.classList.remove(cls), 600);
                    }

                    priceEl.innerText = `$${newPrice.toLocaleString(undefined, { minimumFractionDigits: 4 })}`;

                    const ch = parseFloat(item.priceChangePercent);
                    changeEl.innerText = `${ch >= 0 ? '▲' : '▼'} ${Math.abs(ch).toFixed(2)}%`;
                    changeEl.style.color = ch >= 0 ? 'var(--up-color)' : 'var(--down-color)';

                    lastPrices[id] = newPrice;
                });
            } catch (e) { console.error("Kursni yuklashda xato"); }
        }

        setInterval(fetchPrices, 2000);
        fetchPrices();
    </script>

</body>
</html>
