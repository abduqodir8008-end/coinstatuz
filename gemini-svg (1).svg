<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Saytingiz ranglariga moslangan o'ta yorqin neon gradientlar -->
    <linearGradient id="bullGreen" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0052d4" />    <!-- Pastki qismi - barqaror ko'k -->
      <stop offset="70%" stop-color="#00cc7a" />   <!-- O'rtasi - yashil -->
      <stop offset="100%" stop-color="#00ff88" />  <!-- Cho'qqisi - o'ta yorqin neon -->
    </linearGradient>

    <!-- Kiber miltillash effekti (Glow) -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Orqa foni shaffof, qora fonga mukammal tushadi -->
  <g transform="translate(10, 10)">
    
    <!-- 1. Treyding shamchasining piltasi (Wick) - Bozordagi eng yuqori nuqta -->
    <line x1="50" y1="10" x2="50" y2="25" stroke="#00ff88" stroke-width="3" stroke-linecap="round" filter="url(#neonGlow)" />

    <!-- 2. Dinamik "Buqa Shoxi" va "O'sish Grafik" uyg'unligi (Asosiy tana) -->
    <!-- Bu shakl chapdan o'ngga va yuqoriga qarab keskin o'sib boradi -->
    <path d="M 20 70 
             C 20 70, 35 75, 45 60 
             C 55 45, 45 30, 50 25
             C 52 22, 55 25, 55 30
             C 52 45, 65 55, 80 50
             C 70 65, 50 70, 20 70 Z" 
          fill="url(#bullGreen)" 
          filter="url(#neonGlow)" />

    <!-- 3. Kiber kesiklar (Texnologik ko'rinish berish uchun yupqa chiziqlar) -->
    <path d="M 33 67 L 40 55" stroke="#000000" stroke-width="2" stroke-linecap="round" />
    <path d="M 45 53 L 50 38" stroke="#000000" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
