<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinStat UZ | Live Assets</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-dark: #000;
            --card-bg: #0f0f0f;
            --border-color: #1e1e1e;
            --text-main: #ffffff;
            --text-dim: #666;
            --up-color: #00ff88;
            --down-color: #ff3366;
            --accent-blue: #007bff;
            /* Aktiv rang */
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding-bottom: 90px;
            /* Menyu uchun joy */
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-wrapper img {
            width: 45px;
            height: 45px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .logo-text span {
            font-weight: 200;
            opacity: 0.6;
        }

        /* KRIPTO QATORLAR */
        .crypto-row {
            display: flex;
            align-items: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 28px;
            margin-bottom: 14px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-color);
        }

        .crypto-row:hover {
            border-color: #333;
            background: #151515;
            transform: translateY(-2px);
        }

        .icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            margin-right: 18px;
        }

        .meta {
            flex: 1;
        }

        .meta b {
            display: block;
            font-size: 18px;
            margin-bottom: 2px;
        }

        .meta span {
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .price-box {
            text-align: right;
        }

        .p-val {
            font-family: 'SF Mono', monospace;
            font-size: 17px;
            font-weight: 700;
        }

        .p-change {
            font-size: 12px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            display: inline-block;
            margin-top: 4px;
        }

        .up {
            color: var(--up-color);
        }

        .down {
            color: var(--down-color);
        }

        /* --- PASTKI NAVIGATSIYA (BOTTOM NAV) --- */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            /* Yerdan biroz ko'tarilgan, skrinshotdagidek */
            width: 90%;
            max-width: 380px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
            border-radius: 30px;
            /* Yumaloq dizayn */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .nav-item {
            text-decoration: none;
            color: var(--text-dim);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s ease;
            flex: 1;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
            transition: 0.3s;
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* AKTIV HOLAT - BO'LIMNI BILDIRIB TURADI */
        .nav-item.active {
            color: var(--accent-blue);
        }

        .nav-item.active i {
            transform: translateY(-3px);
            /* Aktiv bo'lganda biroz tepaga chiqadi */
            color: var(--accent-blue);
        }

        /* BOSGANDAGI ANIMATSIYA */
        .nav-item:active {
            transform: scale(0.9);
        }

        /* FLASH EFFEKTI */
        .flash-up {
            animation: flashU 0.6s;
        }

        .flash-down {
            animation: flashD 0.6s;
        }

        @keyframes flashU {
            0% {
                color: var(--up-color);
            }

            100% {
                color: white;
            }
        }

        @keyframes flashD {
            0% {
                color: var(--down-color);
            }

            100% {
                color: white;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <div class="logo-wrapper">
                <img src="./V4gQu01.svg" alt="Logo">
                <div class="logo-text">CoinStat <span>UZ</span></div>
            </div>
            <span id="update-time" style="font-size: 12px; color: var(--text-dim);">Jonli yangilanmoqda</span>
        </div>

        <div id="assets-list">
            <a href="./ton.html" class="crypto-row">
                <img src="https://static.okx.com/cdn/oksupport/asset/currency/icon/ton.png" class="icon">
                <div class="meta"><b>Toncoin</b><span>TON</span></div>
                <div class="price-box">
                    <b class="p-val" id="ton-price">$0.0000</b>
                    <span class="p-change" id="ton-change">0.00%</span>
                </div>
            </a>

            <a href="./btc.html" class="crypto-row">
                <img src="https://static.okx.com/cdn/oksupport/asset/currency/icon/btc.png" class="icon">
                <div class="meta"><b>Bitcoin</b><span>BTC</span></div>
                <div class="price-box">
                    <b class="p-val" id="btc-price">$0.00</b>
                    <span class="p-change" id="btc-change">0.00%</span>
                </div>
            </a>

            <a href="./eth.html" class="crypto-row">
                <img src="https://static.okx.com/cdn/oksupport/asset/currency/icon/eth.png" class="icon">
                <div class="meta"><b>Ethereum</b><span>ETH</span></div>
                <div class="price-box">
                    <b class="p-val" id="eth-price">$0.00</b>
                    <span class="p-change" id="eth-change">0.00%</span>
                </div>
            </a>

            <a href="./usdt.html" class="crypto-row">
                <img src="https://static.okx.com/cdn/oksupport/asset/currency/icon/usdt.png" class="icon">
                <div class="meta"><b>Tether</b><span>USDT</span></div>
                <div class="price-box">
                    <b class="p-val" id="usdt-price">$1.00</b>
                    <span class="p-change" id="usdt-change">0.00%</span>
                </div>
            </a>
        </div>
    </div>
    

    

<div class="bottom-nav">
    <a href="./buy-ton.html" class="nav-item" onclick="showPage('buy-main', this)">
        <i class="bi bi-cart-fill"></i>
        <span>TON Olish</span>
    </a>

    <a href="./nft_gift.html" class="nav-item">
        <i class="bi bi-gift-fill"></i>
        <span>Gift</span>
    </a>

    <a href="javascript:void(0)" class="nav-item active" onclick="showPage('market-page', this)">
        <i class="bi bi-graph-up-arrow"></i>
        <span>Kurs</span>
    </a>



    <a href="./hamkor.html" class="nav-item">
        <i class="bi bi-people-fill"></i>
        <span>Hamkorlik</span>
    </a>
</div>

    <script>
        // Narxlarni yangilash
        let lastPrices = {};

        async function fetchPrices() {
            try {
                const symbols = ["TONUSDT", "BTCUSDT", "ETHUSDT", "USDCUSDT"];
                const response = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${JSON.stringify(symbols)}`);
                const data = await response.json();

                data.forEach(item => {
                    let id = item.symbol.replace('USDT', '').toLowerCase();
                    if (item.symbol === "USDCUSDT") id = "usdt";

                    const priceEl = document.getElementById(`${id}-price`);
                    const changeEl = document.getElementById(`${id}-change`);
                    if (!priceEl) return;

                    const newPrice = parseFloat(item.lastPrice);
                    const oldPrice = lastPrices[id];

                    if (oldPrice && newPrice !== oldPrice) {
                        const cls = newPrice > oldPrice ? 'flash-up' : 'flash-down';
                        priceEl.classList.add(cls);
                        setTimeout(() => priceEl.classList.remove(cls), 600);
                    }

                    priceEl.innerText = `$${newPrice.toLocaleString(undefined, {
                        minimumFractionDigits: id === 'ton' ? 4 : 2
                    })}`;

                    const ch = parseFloat(item.priceChangePercent);
                    changeEl.innerText = `${ch >= 0 ? '▲' : '▼'} ${Math.abs(ch).toFixed(2)}%`;
                    changeEl.className = `p-change ${ch >= 0 ? 'up' : 'down'}`;

                    lastPrices[id] = newPrice;
                });
            } catch (e) { console.error("Data error"); }
        }

        // Bottom Nav aktivligini boshqarish
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', function () {
                navItems.forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');
            });
        });

        setInterval(fetchPrices, 2000);
        fetchPrices();
    </script>
    <script src="script.js"></script>

</body>

</html>
