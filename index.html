<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinStat UZ | Live Assets</title>
    <!-- Professional Shrify -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --bg-pure: #000000;
            --card-dark: #0a0e14;
            --border-neon: #1f2937;
            --text-white: #ffffff;
            --text-grey: #6b7280;
            --trade-green: #00ff88;
            --trade-red: #ff2a5f;
        }

        body {
            background: var(--bg-pure);
            color: var(--text-white);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ASOSIY KONTEYNER */
        .phone-container {
            width: 100%;
            max-width: 430px;
            background: var(--bg-pure);
            min-height: 100vh;
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            box-sizing: border-box;
            
            /* SAYTGA KIRGANDA FAQAT BIR MARTA CHIQADIGAN SILLIQ ANIMATSIYA */
            opacity: 0;
            transform: translateY(15px);
            animation: appEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes appEntrance {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* HEADER */
        .top-navigation {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 16px;
            border-bottom: 1px dashed var(--border-neon);
        }

        .back-btn {
            color: var(--text-white);
            font-size: 1.2rem;
            text-decoration: none;
            width: 42px;
            height: 42px;
            background: var(--card-dark);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-neon);
            transition: all 0.2s;
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        .brand-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: 700;
            color: var(--trade-green);
            background: rgba(0, 255, 136, 0.05);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .blink-dot {
            width: 6px;
            height: 6px;
            background: var(--trade-green);
            border-radius: 50%;
            animation: indicatorBlink 1.5s infinite;
        }

        @keyframes indicatorBlink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* CRYPTO RO'YXATI */
        .assets-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .crypto-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: var(--card-dark);
            border-radius: 16px;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--border-neon);
            transition: background 0.2s, border-color 0.2s;
        }

        .crypto-item:hover {
            border-color: #374151;
            background: #111827;
        }

        .coin-icon-box {
            margin-right: 16px;
        }

        .coin-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .coin-details {
            flex: 1;
        }

        .coin-details .c-name {
            display: block;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-white);
            margin-bottom: 2px;
        }

        .coin-details .c-ticker {
            color: var(--text-grey);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .price-details {
            text-align: right;
        }

        .price-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-white);
            display: block;
            margin-bottom: 4px;
            transition: color 0.1s ease;
        }

        .change-badge {
            font-size: 11px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .change-badge.up { color: var(--trade-green); }
        .change-badge.down { color: var(--trade-red); }

        /* HAQIQIY BIRJA USLUBIDAGI NORMAN NARX UPDATE ANIMATSIYASI (FAQAT MATN UCHUN) */
        .price-flash-up { animation: flashUp 0.8s ease-out; }
        .price-flash-down { animation: flashDown 0.8s ease-out; }

        @keyframes flashUp {
            0% { color: var(--trade-green); }
            100% { color: var(--text-white); }
        }

        @keyframes flashDown {
            0% { color: var(--trade-red); }
            100% { color: var(--text-white); }
        }
    </style>
</head>

<body>

    <div class="phone-container">
        <!-- Navigation -->
        <div class="top-navigation">
            <a href="bolim.html" class="back-btn">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div class="brand-title">cofeature</div>
            <div class="live-indicator">
                <div class="blink-dot"></div> Live
            </div>
        </div>

        <!-- Crypto List -->
        <div class="assets-wrapper" id="assets-list">
            <!-- TON -->
            <a href="./ton.html" class="crypto-item">
                <div class="coin-icon-box">
                    <img src="./image.png" class="coin-img" alt="TON">
                </div>
                <div class="coin-details">
                    <span class="c-name">Gramcoin</span>
                    <span class="c-ticker">GRAM / USDT</span>
                </div>
                <div class="price-details">
                    <span class="price-val" id="ton-price">$0.0000</span>
                    <span class="change-badge up" id="ton-change">0.00%</span>
                </div>
            </a>

            <!-- BTC -->
            <a href="./btc.html" class="crypto-item">
                <div class="coin-icon-box">
                    <img src="https://static.okx.com/cdn/oksupport/asset/currency/icon/btc.png" class="coin-img" alt="BTC">
                </div>
                <div class="coin-details">
                    <span class="c-name">Bitcoin</span>
                    <span class="c-ticker">BTC / USDT</span>
                </div>
                <div class="price-details">
                    <span class="price-val" id="btc-price">$0.00</span>
                    <span class="change-badge up" id="btc-change">0.00%</span>
                </div>
            </a>

            <!-- ETH -->
            <a href="./eth.html" class="crypto-item">
                <div class="coin-icon-box">
                    <img src="https://static.okx.com/cdn/oksupport/asset/currency/icon/eth.png" class="coin-img" alt="ETH">
                </div>
                <div class="coin-details">
                    <span class="c-name">Ethereum</span>
                    <span class="c-ticker">ETH / USDT</span>
                </div>
                <div class="price-details">
                    <span class="price-val" id="eth-price">$0.00</span>
                    <span class="change-badge up" id="eth-change">0.00%</span>
                </div>
            </a>

            <!-- USDT -->
            <a href="./usdt.html" class="crypto-item">
                <div class="coin-icon-box">
                    <img src="https://static.okx.com/cdn/oksupport/asset/currency/icon/usdt.png" class="coin-img" alt="USDT">
                </div>
                <div class="coin-details">
                    <span class="c-name">Tether</span>
                    <span class="c-ticker">USDT / USDC</span>
                </div>
                <div class="price-details">
                    <span class="price-val" id="usdt-price">$1.00</span>
                    <span class="change-badge up" id="usdt-change">0.00%</span>
                </div>
            </a>
        </div>
    </div>

    <script>
        let lastPrices = {};
        
        async function fetchPrices() {
            try {
                const symbols = ["TONUSDT", "BTCUSDT", "ETHUSDT", "USDCUSDT"];
                const response = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${JSON.stringify(symbols)}`);
                const data = await response.json();

                data.forEach(item => {
                    let id = item.symbol.replace('USDT', '').toLowerCase();
                    if (item.symbol === "USDCUSDT") id = "usdt";

                    const priceEl = document.getElementById(`${id}-price`);
                    const changeEl = document.getElementById(`${id}-change`);
                    if (!priceEl) return;

                    const newPrice = parseFloat(item.lastPrice);
                    const oldPrice = lastPrices[id];

                    // Faqat narx yozuvining o'zini professional miltillashi (flash)
                    if (oldPrice && newPrice !== oldPrice) {
                        const flashClass = newPrice > oldPrice ? 'price-flash-up' : 'price-flash-down';
                        priceEl.classList.remove('price-flash-up', 'price-flash-down'); // eskisini tozalash
                        void priceEl.offsetWidth; // animatsiyani qayta yuklash uchun hiyla
                        priceEl.classList.add(flashClass);
                    }

                    priceEl.innerText = `$${newPrice.toLocaleString(undefined, {
                        minimumFractionDigits: id === 'ton' ? 4 : 2,
                        maximumFractionDigits: id === 'ton' ? 4 : 2
                    })}`;

                    const ch = parseFloat(item.priceChangePercent);
                    changeEl.innerText = `${ch >= 0 ? '+' : ''}${ch.toFixed(2)}%`;
                    changeEl.className = `change-badge ${ch >= 0 ? 'up' : 'down'}`;

                    lastPrices[id] = newPrice;
                });
            } catch (e) { 
                console.error("Xatolik."); 
            }
        }

        setInterval(fetchPrices, 2500);
        fetchPrices();
    </script>
</body>
</html>
