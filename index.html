<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinStat UZ | Live Assets</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-dark: #000;
            --card-bg: #0f0f0f;
            --border-color: #1e1e1e;
            --text-main: #ffffff;
            --text-dim: #666;
            --up-color: #00ff88;
            --down-color: #ff3366;
            --accent-blue: #007bff;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* TEPADAGI ORQAGA QAYTISH TUGMASI */
        .top-navigation {
            padding: 10px 0 20px 0;
            display: flex;
            align-items: center;
        }

        .back-link {
            color: white;
            font-size: 28px;
            text-decoration: none;
            transition: 0.2s;
            display: inline-flex;
        }

        .back-link:active {
            transform: scale(0.9);
            opacity: 0.7;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-wrapper img {
            width: 45px;
            height: 45px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .logo-text span {
            font-weight: 200;
            opacity: 0.6;
        }

        /* KRIPTO QATORLAR */
        .crypto-row {
            display: flex;
            align-items: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 28px;
            margin-bottom: 14px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-color);
        }

        .crypto-row:hover {
            border-color: #333;
            background: #151515;
            transform: translateY(-2px);
        }

        .icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            margin-right: 18px;
        }

        .meta { flex: 1; }
        .meta b { display: block; font-size: 18px; margin-bottom: 2px; }
        .meta span { color: var(--text-dim); font-size: 13px; font-weight: 600; text-transform: uppercase; }

        .price-box { text-align: right; }
        .p-val { font-family: 'SF Mono', monospace; font-size: 17px; font-weight: 700; }
        .p-change {
            font-size: 12px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            display: inline-block;
            margin-top: 4px;
        }

        .up { color: var(--up-color); }
        .down { color: var(--down-color); }

        /* FLASH EFFEKTI */
        .flash-up { animation: flashU 0.6s; }
        .flash-down { animation: flashD 0.6s; }
        @keyframes flashU { 0% { color: var(--up-color); } 100% { color: white; } }
        @keyframes flashD { 0% { color: var(--down-color); } 100% { color: white; } }
    </style>
</head>

<body>

    <div class="container">
      

        <div class="header">
              <div class="top-navigation">
            <a href="bolim.html" class="back-link">
                <i class="bi bi-arrow-left"></i>
            </a>
        </div>
            <div class="logo-wrapper">
                <img src="./V4gQu01.svg" alt="Logo">
                <div class="logo-text">CoinStat <span>UZ</span></div>
            </div>
            <span style="font-size: 12px; color: var(--text-dim);">Jonli yangilanmoqda</span>
        </div>

        <div id="assets-list">
            <a href="./ton.html" class="crypto-row">
                <img src="https://static.okx.com/cdn/oksupport/asset/currency/icon/ton.png" class="icon">
                <div class="meta"><b>Toncoin</b><span>TON</span></div>
                <div class="price-box">
                    <b class="p-val" id="ton-price">$0.0000</b>
                    <span class="p-change" id="ton-change">0.00%</span>
                </div>
            </a>

            <a href="./btc.html" class="crypto-row">
                <img src="https://static.okx.com/cdn/oksupport/asset/currency/icon/btc.png" class="icon">
                <div class="meta"><b>Bitcoin</b><span>BTC</span></div>
                <div class="price-box">
                    <b class="p-val" id="btc-price">$0.00</b>
                    <span class="p-change" id="btc-change">0.00%</span>
                </div>
            </a>

            <a href="./eth.html" class="crypto-row">
                <img src="https://static.okx.com/cdn/oksupport/asset/currency/icon/eth.png" class="icon">
                <div class="meta"><b>Ethereum</b><span>ETH</span></div>
                <div class="price-box">
                    <b class="p-val" id="eth-price">$0.00</b>
                    <span class="p-change" id="eth-change">0.00%</span>
                </div>
            </a>

            <a href="./usdt.html" class="crypto-row">
                <img src="https://static.okx.com/cdn/oksupport/asset/currency/icon/usdt.png" class="icon">
                <div class="meta"><b>Tether</b><span>USDT</span></div>
                <div class="price-box">
                    <b class="p-val" id="usdt-price">$1.00</b>
                    <span class="p-change" id="usdt-change">0.00%</span>
                </div>
            </a>
        </div>
    </div>

    <script>
        let lastPrices = {};
        async function fetchPrices() {
            try {
                const symbols = ["TONUSDT", "BTCUSDT", "ETHUSDT", "USDCUSDT"];
                const response = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${JSON.stringify(symbols)}`);
                const data = await response.json();

                data.forEach(item => {
                    let id = item.symbol.replace('USDT', '').toLowerCase();
                    if (item.symbol === "USDCUSDT") id = "usdt";

                    const priceEl = document.getElementById(`${id}-price`);
                    const changeEl = document.getElementById(`${id}-change`);
                    if (!priceEl) return;

                    const newPrice = parseFloat(item.lastPrice);
                    const oldPrice = lastPrices[id];

                    if (oldPrice && newPrice !== oldPrice) {
                        const cls = newPrice > oldPrice ? 'flash-up' : 'flash-down';
                        priceEl.classList.add(cls);
                        setTimeout(() => priceEl.classList.remove(cls), 600);
                    }

                    priceEl.innerText = `$${newPrice.toLocaleString(undefined, {
                        minimumFractionDigits: id === 'ton' ? 4 : 2
                    })}`;

                    const ch = parseFloat(item.priceChangePercent);
                    changeEl.innerText = `${ch >= 0 ? '▲' : '▼'} ${Math.abs(ch).toFixed(2)}%`;
                    changeEl.className = `p-change ${ch >= 0 ? 'up' : 'down'}`;

                    lastPrices[id] = newPrice;
                });
            } catch (e) { console.error("Data error"); }
        }

        setInterval(fetchPrices, 2000);
        fetchPrices();
    </script>
</body>
</html>
