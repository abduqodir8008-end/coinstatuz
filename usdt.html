<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Live Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { 
            --bg: #0b0e11; 
            --card: #1e2329; 
            --usdt-teal: #26a17b; /* Tether yashil rangi */
            --up: #0ecb81; 
            --down: #f6465d;
            --gold: #f0b90b;
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .phone-container { 
            width: 100%; 
            max-width: 480px; 
            background: var(--card); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.6); 
        }
        
        .top-header { 
            height: 260px; 
            background: linear-gradient(180deg, var(--usdt-teal) 0%, var(--card) 100%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            padding-top: 30px; 
        }

        .back-btn { 
            position: absolute; 
            left: 20px; 
            top: 45px; 
            font-size: 1.8rem; 
            color: white; 
            cursor: pointer; 
            z-index: 10; 
        }

        .floating-logo { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%;
            animation: floatAnim 3s ease-in-out infinite; 
            filter: drop-shadow(0 15px 25px rgba(38, 161, 123, 0.5)); 
            margin-bottom: 10px;
            object-fit: contain;
            background: white;
            padding: 8px;
        }
        
        @keyframes floatAnim { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-15px); } 
        }

        .price-display { 
            text-align: center; 
            margin-top: -10px; 
            padding: 0 20px; 
            min-height: 110px; 
        }

        .main-price { 
            font-size: 3.8rem; 
            font-weight: 900; 
            letter-spacing: -2px; 
            line-height: 1.1;
        }

        .calc-wrapper { padding: 25px 20px; }

        .input-item { 
            background: #2b3139; 
            border-radius: 20px; 
            padding: 15px 20px; 
            margin-bottom: 15px; 
            border: 1px solid #3d434a; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }

        .input-item i { font-size: 1.5rem; color: var(--usdt-teal); }

        .input-content { flex: 1; }

        .input-item label { 
            display: block; 
            font-size: 0.7rem; 
            color: #848e9c; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-bottom: 2px; 
        }

        .input-item input { 
            background: transparent; 
            border: none; 
            color: white; 
            width: 100%; 
            font-size: 1.6rem; 
            font-weight: bold; 
            outline: none; 
        }

        .footer-status { 
            margin-top: auto; 
            padding: 25px; 
            background: rgba(0, 0, 0, 0.2); 
            border-top: 1px solid #2b3139; 
            text-align: center;
        }

        .rate-line { font-size: 1rem; color: #848e9c; margin-bottom: 5px; }
        .rate-line span { color: white; font-weight: bold; }
        .time-line { font-size: 0.85rem; color: #5c6a77; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="top-header">
        <i class="bi bi-arrow-left back-btn" onclick="history.back()"></i>
        <img src="https://assets.coingecko.com/coins/images/325/large/tether.png" class="floating-logo" alt="USDT Logo">
        <h2 class="mt-2 fw-bold" style="letter-spacing: 2px;">TETHER USDT</h2>
    </div>

    <div class="price-display">
        <div id="price" class="main-price">$1.00</div>
        <div id="change" class="fw-bold fs-4">0.00%</div>
    </div>

    <div class="calc-wrapper">
        <div class="input-item">
            <i class="bi bi-shield-check"></i> 
            <div class="input-content">
                <label>USDT Miqdori</label>
                <input type="number" id="tVal" value="1" step="0.01" oninput="runCalc('t')">
            </div>
        </div>

        <div class="input-item">
            <i class="bi bi-currency-dollar" style="color: var(--up);"></i>
            <div class="input-content">
                <label>AQSH Dollari (USD)</label>
                <input type="text" id="uVal" oninput="runCalc('u')">
            </div>
        </div>

        <div class="input-item" style="border-bottom: 4px solid var(--gold);">
            <i class="bi bi-wallet2" style="color: var(--gold);"></i>
            <div class="input-content">
                <label>O'zbek So'mi (UZS)</label>
                <input type="text" id="sVal" oninput="runCalc('s')">
            </div>
        </div>
    </div>

    <div class="footer-status">
        <div class="rate-line">1 USD = <span id="rateUzs">...</span> UZS</div>
        <div class="time-line">Yangilandi: <span id="clock">--:--:--</span></div>
    </div>
</div>

<script>
    let usdtPrice = 1.00, uzsNow = 12650;

    function formatNum(n, d = 0) {
        return parseFloat(n).toLocaleString('ru-RU', { minimumFractionDigits: d, maximumFractionDigits: d });
    }

    function parseNum(s) {
        return parseFloat(s.toString().replace(/\s/g, '').replace(',', '.')) || 0;
    }

    async function updateUSDT() {
        try {
            // UZS kursi
            const r1 = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const d1 = await r1.json();
            uzsNow = d1.rates.UZS;
            document.getElementById('rateUzs').innerText = formatNum(uzsNow);

            // USDT Narxi (Binance API) - Odatda 1.00 atrofida bo'ladi
            const r2 = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=USDTUSDC');
            const d2 = await r2.json();
            
            if (d2.lastPrice) {
                // USDT stabil bo'lgani uchun narxini 1.00 kabi ko'rsatamiz
                usdtPrice = parseFloat(d2.lastPrice);
                const change = parseFloat(d2.priceChangePercent);

                document.getElementById('price').innerText = `$${usdtPrice.toFixed(2)}`;
                const cEl = document.getElementById('change');
                cEl.innerText = `${change >= 0 ? '▲' : '▼'} ${Math.abs(change).toFixed(2)}%`;
                cEl.style.color = change >= 0 ? '#0ecb81' : '#f6465d';
            }

            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            
            if (!['tVal', 'uVal', 'sVal'].includes(document.activeElement.id)) {
                runCalc('t');
            }
        } catch(e) { 
            console.log("Xatolik yuz berdi...");
        }
    }

    function runCalc(type) {
        const t = document.getElementById('tVal'), 
              u = document.getElementById('uVal'), 
              s = document.getElementById('sVal');
        
        if (!usdtPrice) return;

        if (type === 't') {
            const val = parseFloat(t.value) || 0;
            const usd = val * usdtPrice;
            u.value = formatNum(usd, 2);
            s.value = formatNum(Math.round(usd * uzsNow));
        } else if (type === 'u') {
            const val = parseNum(u.value);
            t.value = (val / usdtPrice).toFixed(2);
            s.value = formatNum(Math.round(val * uzsNow));
        } else if (type === 's') {
            const val = parseNum(s.value);
            const usd = val / uzsNow;
            u.value = formatNum(usd, 2);
            t.value = (usd / usdtPrice).toFixed(2);
        }
    }

    updateUSDT();
    setInterval(updateUSDT, 5000); 
</script>

</body>
</html>
