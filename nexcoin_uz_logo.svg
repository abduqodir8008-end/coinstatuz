  <line x1="640" y1="80" x2="640" y2="40" stroke="#534AB7" stroke-width="1"/>
  <line x1="640" y1="40" x2="600" y2="40" stroke="#534AB7" stroke-width="1"/>
  <line x1="40" y1="600" x2="40" y2="640" stroke="#534AB7" stroke-width="1"/>
  <line x1="40" y1="640" x2="80" y2="640" stroke="#534AB7" stroke-width="1"/>
  <line x1="640" y1="600" x2="640" y2="640" stroke="#534AB7" stroke-width="1"/>
