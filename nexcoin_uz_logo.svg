  <circle cx="330" cy="520" r="2" fill="#AFA9EC"/>
  <circle cx="350" cy="520" r="2" fill="#AFA9EC"/>
  <circle cx="370" cy="520" r="2" fill="#7F77DD"/>
  <circle cx="390" cy="520" r="2" fill="#534AB7"/>
  <circle cx="410" cy="520" r="2" fill="#534AB7"/>

  <text x="340" y="570" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#26215C">nexcoinuz.com</text>
