<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereum Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --bg: #06080c; 
            --card: rgba(21, 26, 38, 0.65); 
            --eth-purple: #627eea; /* Ethereum rasmiy binafsha rangi */
            --up: #00e676; 
            --down: #ff3d57;
            --gold: #ffb703; 
            --border: rgba(255, 255, 255, 0.07);
        }
        
        body { 
            background: var(--bg); 
            color: #f8f9fa; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            /* Orqa fondagi gradient neon jozibasi */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(98, 126, 234, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 230, 118, 0.04) 0%, transparent 40%);
        }

        .phone-container { 
            width: 100%; 
            max-width: 460px; 
            background: rgba(9, 12, 19, 0.95); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        
        /* Header qismi - Ethereum gradient effekti */
        .top-header { 
            height: 250px; 
            background: linear-gradient(180deg, rgba(98, 126, 234, 0.15) 0%, transparent 100%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            padding-top: 20px; 
        }

        .back-btn { 
            position: absolute; 
            left: 24px; 
            top: 40px; 
            font-size: 1.5rem; 
            color: #848e9c; 
            cursor: pointer; 
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .back-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .floating-logo { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%;
            animation: floatAnim 3.5s ease-in-out infinite; 
            filter: drop-shadow(0 10px 20px rgba(98, 126, 234, 0.35)); 
            margin-bottom: 12px;
        }
        
        @keyframes floatAnim { 
            0%, 100% { transform: translateY(0) rotate(0deg); } 
            50% { transform: translateY(-10px) rotate(3deg); } 
        }

        /* Narx displeyi */
        .price-display { 
            text-align: center; 
            padding: 0 24px; 
            margin-bottom: 20px;
        }

        .main-price { 
            font-size: 3.5rem; 
            font-weight: 800; 
            letter-spacing: -1.5px; 
            line-height: 1.1;
            background: linear-gradient(180deg, #ffffff 0%, #e2e8f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge-change {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 700;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Kalkulyator maydonlari (Glassmorphism) */
        .calc-wrapper { 
            padding: 10px 24px; 
        }

        .input-item { 
            background: var(--card); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px; 
            padding: 14px 20px; 
            margin-bottom: 18px; 
            border: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            gap: 16px; 
            transition: all 0.3s ease;
        }

        /* Fokus holatidagi ichki neon nur */
        .input-item:focus-within {
            border-color: var(--eth-purple);
            box-shadow: 0 0 20px rgba(98, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        .input-item.usd-item:focus-within {
            border-color: var(--up);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.15);
        }

        .input-item.uzs-item:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(255, 183, 3, 0.15);
        }

        .input-item i { 
            font-size: 1.6rem; 
            color: var(--eth-purple); 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: rgba(98, 126, 234, 0.1);
            border-radius: 14px;
        }

        .input-item.usd-item i { color: var(--up); background: rgba(0, 230, 118, 0.1); }
        .input-item.uzs-item i { color: var(--gold); background: rgba(255, 183, 3, 0.1); }

        .input-content { flex: 1; }

        .input-item label { 
            display: block; 
            font-size: 0.75rem; 
            color: #848e9c; 
            font-weight: 700; 
            text-transform: uppercase; 
            margin-bottom: 4px; 
            letter-spacing: 0.5px;
        }

        .input-item input { 
            background: transparent; 
            border: none; 
            color: white; 
            width: 100%; 
            font-size: 1.4rem; 
            font-weight: 700; 
            outline: none; 
            padding: 0;
        }

        /* Pastki Panel */
        .footer-status { 
            margin-top: auto; 
            padding: 24px; 
            background: rgba(7, 9, 15, 0.85);
            border-top: 1px solid var(--border); 
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .rate-line { 
            font-size: 0.95rem; 
            color: #848e9c; 
            margin-bottom: 6px; 
            font-weight: 600;
        }

        .rate-line span { 
            color: #ffffff; 
            font-weight: 700; 
        }

        .time-line { 
            font-size: 0.8rem; 
            color: #5c6a77; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .time-line i {
            font-size: 0.9rem;
            color: var(--eth-purple);
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="top-header">
        <i class="bi bi-arrow-left back-btn" onclick="history.back()"></i>
        <img src="https://assets.coingecko.com/coins/images/279/large/ethereum.png" class="floating-logo" alt="ETH Logo">
        <h5 class="mt-2 m-0" style="letter-spacing: 3px; font-weight: 800; color: #fff;">ETHEREUM ETH</h5>
    </div>

    <div class="price-display">
        <div id="price" class="main-price">$0.00</div>
        <div class="badge-change" id="changeBadge">
            <span id="change">0.00%</span>
        </div>
    </div>

    <div class="calc-wrapper">
        <div class="input-item">
            <i class="bi bi-ev-station"></i>
            <div class="input-content">
                <label>ETH Miqdori</label>
                <input type="number" id="eVal" value="1" step="0.0001" placeholder="0.0000" oninput="runCalc('e')">
            </div>
        </div>

        <div class="input-item usd-item">
            <i class="bi bi-currency-dollar"></i>
            <div class="input-content">
                <label>AQSH Dollari (USD)</label>
                <input type="text" id="uVal" placeholder="0.00" oninput="runCalc('u')">
            </div>
        </div>

        <div class="input-item uzs-item">
            <i class="bi bi-wallet2"></i>
            <div class="input-content">
                <label>O'zbek So'mi (UZS)</label>
                <input type="text" id="sVal" placeholder="0" oninput="runCalc('s')">
            </div>
        </div>
    </div>

    <div class="footer-status">
        <div class="rate-line">1 USD = <span id="rateUzs">...</span> UZS</div>
        <div class="time-line">
            <i class="bi bi-arrow-repeat"></i> 
            Yangilandi: <span id="clock">--:--:--</span>
        </div>
    </div>
</div>

<script>
    let ethPrice = 0, uzsNow = 12650;

    function formatNum(n, d = 0) {
        return parseFloat(n).toLocaleString('ru-RU', { minimumFractionDigits: d, maximumFractionDigits: d });
    }

    function parseNum(s) {
        return parseFloat(s.toString().replace(/\s/g, '').replace(',', '.')) || 0;
    }

    async function updateETH() {
        try {
            // UZS Kursi
            const r1 = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const d1 = await r1.json();
            uzsNow = d1.rates.UZS;
            document.getElementById('rateUzs').innerText = formatNum(uzsNow);

            // ETH Narxi (Binance)
            const r2 = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=ETHUSDT');
            const d2 = await r2.json();
            
            if (d2.lastPrice) {
                ethPrice = parseFloat(d2.lastPrice);
                const change = parseFloat(d2.priceChangePercent);

                document.getElementById('price').innerText = `$${formatNum(ethPrice, 2)}`;
                
                const cEl = document.getElementById('change');
                const badge = document.getElementById('changeBadge');
                
                cEl.innerText = `${change >= 0 ? '▲' : '▼'} ${Math.abs(change).toFixed(2)}%`;
                
                if (change >= 0) {
                    badge.style.background = 'rgba(0, 230, 118, 0.15)';
                    cEl.style.color = '#00e676';
                } else {
                    badge.style.background = 'rgba(255, 61, 87, 0.15)';
                    cEl.style.color = '#ff3d57';
                }
            }

            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            
            if (!['eVal', 'uVal', 'sVal'].includes(document.activeElement.id)) {
                runCalc('e');
            }
        } catch(e) { 
            console.log("Xatolik yuz berdi...");
        }
    }

    function runCalc(type) {
        const e = document.getElementById('eVal'), 
              u = document.getElementById('uVal'), 
              s = document.getElementById('sVal');
        
        if (!ethPrice) return;

        if (type === 'e') {
            const val = parseFloat(e.value) || 0;
            const usd = val * ethPrice;
            u.value = usd === 0 ? "" : usd.toFixed(2);
            s.value = usd === 0 ? "" : Math.round(usd * uzsNow);
        } else if (type === 'u') {
            const val = parseNum(u.value);
            e.value = val === 0 ? "" : (val / ethPrice).toFixed(6);
            s.value = val === 0 ? "" : Math.round(val * uzsNow);
        } else if (type === 's') {
            const val = parseNum(s.value);
            const usd = val / uzsNow;
            u.value = val === 0 ? "" : usd.toFixed(2);
            e.value = val === 0 ? "" : (usd / ethPrice).toFixed(6);
        }
    }

    updateETH();
    setInterval(updateETH, 5000);
</script>

</body>
</html>
